name: Build and publish release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build executable
        shell: powershell
        run: .\nfe_xml_corrector\build_exe.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: windows-package
          path: dist/CorretorXMLNFe.exe
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tk libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes tcl-dev tk-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate Tkinter
        run: python -c "import tkinter; print(tkinter.TkVersion)"

      - name: Run tests
        run: python -m pytest -q

      - name: Run web tests
        run: node --test web/tests/core.test.mjs

      - name: Build Linux package
        run: bash nfe_xml_corrector/build_linux.sh

      - name: Upload Linux package
        uses: actions/upload-artifact@v7
        with:
          name: linux-package
          path: dist/CorretorXMLNFe-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: "*-package"
          path: release-assets
          merge-multiple: true

      - name: Add manual and checksums
        run: |
          cp docs/Manual_Corretor_XML_NFe.docx release-assets/
          cd release-assets
          sha256sum CorretorXMLNFe.exe CorretorXMLNFe-linux-x86_64.tar.gz \
            Manual_Corretor_XML_NFe.docx > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --title "Corretor de XML NF-e ${tag}" \
              --generate-notes
          fi
